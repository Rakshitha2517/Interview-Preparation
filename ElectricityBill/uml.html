
<div id="uml" style="padding:1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('uml-svg', `classDiagram
  class Admin {
    +Integer id
    +String adminName
    +String username
    +String password
    +getAllAdmin() List
    +saveAdmin(Admin) Admin
    +updateAdmin(int, Admin) Admin
    +deleteAdmin(int) String
  }

  class Customer {
    +Integer id
    +String customerName
    +String address
    +String meterNo
    +Double unitsConsumed
    +getAllCustomer() List
    +saveCustomer(Customer) Customer
    +updateCustomer(int, Customer) Customer
    +deleteCustomer(int) String
  }

  class Payment {
    +Integer id
    +Customer customer
    +Double unitsConsumed
    +Double amount
    +String paymentType
    +String slabCategory
    +LocalDate paymentDate
    +getAllPayments() List
    +savePayment(Payment) Payment
    +updatePayment(int, Payment) Payment
    +deletePayment(int) String
    +getOneYearHistory(int) List
  }

  class BillCalculatorService {
    +calculateBill(double) double
    +getSlabCategory(double) String
  }

  Customer "1" --> "many" Payment : makes
  Payment --> BillCalculatorService : uses
`);
document.getElementById('uml').innerHTML = svg;
</script>
